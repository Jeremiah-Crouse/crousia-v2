<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6c8"/>
      <stop offset="50%" style="stop-color:#e8d4b0"/>
      <stop offset="100%" style="stop-color:#d4c4a8"/>
    </linearGradient>
    <linearGradient id="roll" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="50%" style="stop-color:#6b5344"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- Parchment body -->
  <rect x="15" y="20" width="70" height="60" rx="2" fill="url(#parchment)" filter="url(#shadow)"/>
  
  <!-- Top roll -->
  <ellipse cx="50" cy="20" rx="37" ry="8" fill="url(#roll)"/>
  <ellipse cx="50" cy="18" rx="35" ry="6" fill="#9b8365"/>
  
  <!-- Bottom roll -->
  <ellipse cx="50" cy="80" rx="37" ry="8" fill="url(#roll)"/>
  <ellipse cx="50" cy="82" rx="35" ry="6" fill="#9b8365"/>
  
  <!-- Lines on parchment -->
  <line x1="25" y1="35" x2="75" y2="35" stroke="#a89880" stroke-width="1"/>
  <line x1="25" y1="45" x2="75" y2="45" stroke="#a89880" stroke-width="1"/>
  <line x1="25" y1="55" x2="75" y2="55" stroke="#a89880" stroke-width="1"/>
  <line x1="25" y1="65" x2="75" y2="65" stroke="#a89880" stroke-width="1"/>
  
  <!-- Gold accent on top -->
  <ellipse cx="50" cy="16" rx="30" ry="3" fill="#d4af37" opacity="0.6"/>
</svg>
